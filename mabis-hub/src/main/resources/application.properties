spring.application.name=mabis-hub
server.port=8080

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/mabis
spring.datasource.username=mabis
spring.datasource.password=mabis
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Swagger UI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.tagsSorter=alpha

# JSON: ISO-8601 für Instant und LocalDate
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false

# OAuth2 Resource Server – Keycloak
# Ersetze <realm> mit dem echten Keycloak-Realm-Namen
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:9090/realms/mabis
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:9090/realms/mabis/protocol/openid-connect/certs

# Keycloak Client-ID für Rollen-Extraktion aus resource_access-Claim
mabis.security.keycloak.client-id=mabis-hub

# Logging
logging.level.de.mabis=INFO
logging.level.org.springframework.security=DEBUG
